[build]
  command = "npm run build"
  publish = "dist/client"

[build.environment]
  NODE_VERSION = "22"

[dev]
  command = "npm run dev"

[[headers]]
  for = "/assets/*"

  [headers.values]
    Cache-Control = "public, max-age=31560000, immutable"

[template.environment]
  PUBLIC_STORE_DOMAIN = "01n1nx-bc.myshopify.com"
  PUBLIC_CHECKOUT_DOMAIN = "edelpop.de"
  PUBLIC_STOREFRONT_API_TOKEN = "Replace in Netlify environment variables"
  PRIVATE_STOREFRONT_API_TOKEN = "Replace in Netlify environment variables if needed"
  SESSION_SECRET = "Replace with a random secret in Netlify environment variables"
